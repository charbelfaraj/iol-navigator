<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>IOL Navigator — Intraocular Lens Decision Platform</title>
    <meta name="title" content="IOL Navigator — Intraocular Lens Decision Platform" />
    <meta name="description" content="Evidence-based IOL selection algorithms, pre-operative screening tools, and patient education. A comprehensive platform for eye care professionals and patients." />
    <meta name="keywords" content="IOL, intraocular lens, cataract surgery, IOL selection, multifocal IOL, toric IOL, EDOF, monofocal, ophthalmology, optometry, eye care, lens decision, cataract" />
    <meta name="author" content="Charbel" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="IOL Navigator — Intraocular Lens Decision Platform" />
    <meta property="og:description" content="Evidence-based IOL selection algorithms, pre-operative screening tools, and patient education for eye care professionals and patients." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="IOL Navigator — Intraocular Lens Decision Platform" />
    <meta property="twitter:description" content="Evidence-based IOL selection algorithms, pre-operative screening tools, and patient education for eye care professionals and patients." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet" />

    <style>
      /* Reset & Base */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body, #root {
        height: 100%;
        width: 100%;
      }
      body {
        background: #0a0e17;
        color: #e8edf5;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      /* Selection */
      ::selection { background: rgba(99,179,237,0.3); color: #e8edf5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
